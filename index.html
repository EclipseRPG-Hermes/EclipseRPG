<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#8b0000" />
  <link rel="manifest" href="manifest.json" />
  <title>Eclipse RPG</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap');
    :root { 
      --blood: #8b0000; --ember: #c0392b; --gold: #a07830; --void: #0a0a0a; --pale: #c8beb0; --white: #f0e8e0; --panel: #0d0404; --border2: #2a1515; 
      --font-display: 'Cinzel Decorative', serif; 
      --font-body: 'Crimson Pro', serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background-color: var(--void); color: var(--pale); font-family: var(--font-body); overflow-x: hidden; position: relative; -webkit-font-smoothing: antialiased; }
    .bg { position: fixed; inset: 0; z-index: -2; background: radial-gradient(ellipse at 50% 110%, #1a0505 0%, #0a0a0a 65%); }
    .scanlines { position: fixed; inset: 0; z-index: -1; pointer-events: none; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px); }
    .embers { position: fixed; inset: 0; pointer-events: none; z-index: -1; background-image: radial-gradient(circle, var(--ember) 1px, transparent 1px); background-size: 100px 100px; opacity: 0.2; }
    .ember { position: absolute; width: 2px; height: 2px; border-radius: 50%; background: var(--ember); animation: rise var(--dur) ease-in infinite; left: var(--x); bottom: -10px; opacity: 0; }
    @keyframes rise { 0%{transform:translateY(0);opacity:0} 10%{opacity:.8} 100%{transform:translateY(-100vh);opacity:0} }
    #loader { position: fixed; inset: 0; z-index: 200; background: var(--void); display: flex; align-items: center; justify-content: center; transition: opacity 0.8s; }
    #loader.hidden { opacity: 0; pointer-events: none; }
    .loader-ring { width: 40px; height: 40px; border: 2px solid #2a1010; border-top-color: var(--blood); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn { position: relative; padding: 0.8rem 1.5rem; background: rgba(139, 0, 0, 0.1); border: 1px solid var(--blood); color: var(--white); font-family: var(--font-display); font-weight: 700; font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: 0.3s; margin-bottom: 0.5rem; display: inline-block; text-align: center; }
    .btn:hover { background: var(--blood); color: white; box-shadow: 0 0 15px rgba(139,0,0,0.5); }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; }
    .btn-ghost { border-color: var(--gold); color: var(--gold); background: transparent; }
    .btn-ghost:hover { background: rgba(160, 120, 48, 0.2); }
    .screen-overlay { width: 100%; min-height: 100vh; display: flex; flex-direction: column; background: transparent; padding: 2rem; border: 4px solid var(--void); outline: 1px solid var(--blood); position: relative; z-index: 10; }
    .screen-overlay.hidden { display: none !important; }
    .cr-header { padding-bottom: 1.5rem; border-bottom: 1px solid rgba(160, 120, 48, 0.2); text-align: center; margin-bottom: 1.5rem; }
    .cr-title { font-family: var(--font-display); font-size: 2.5rem; color: var(--blood); text-shadow: 0 0 15px rgba(139, 0, 0, 0.6); letter-spacing: 0.1em; text-transform: uppercase; }
    .cr-body { flex: 1; margin: 0 auto; width: 100%; max-width: 1200px; }
    .cr-footer { padding-top: 1.5rem; margin-top: auto; display: flex; gap: 0.5rem; max-width: 600px; margin-inline: auto; width: 100%; border-top: 1px solid rgba(160, 120, 48, 0.2); font-size: 0.7rem; color: var(--gold); }
    .epic-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--blood); color: var(--white); font-family: var(--font-display); font-size: 1.3rem; padding: 0.5rem; text-align: center; outline: none; margin-bottom: 2rem; }
    .race-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
    .race-card, .trait-card { border: 1px solid rgba(139,0,0,0.3); padding: 1rem; background: rgba(10,10,10,0.8); cursor: pointer; text-align: left; transition: 0.2s; }
    .race-card.selected, .trait-card.selected { border-color: var(--blood); background: rgba(139,0,0,0.2); box-shadow: 0 0 10px rgba(139,0,0,0.5); }
    .epic-textarea { width: 100%; background: rgba(10,10,10,0.8); border: 1px solid var(--blood); color: var(--pale); padding: 1rem; font-family: var(--font-body); resize: none; outline: none; margin-bottom: 1rem; line-height: 1.6; }
    .portrait-frame { width: 100%; max-width: 400px; margin: 0 auto 1.5rem auto; aspect-ratio: 2/3; border: 2px solid var(--gold); box-shadow: 0 0 30px rgba(0,0,0,1); background: #000; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .portrait-img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 1s; }
    #game-image-wrapper { width: 100%; aspect-ratio: 16/9; margin-bottom: 1.5rem; border: 2px solid var(--gold); box-shadow: 0 0 30px rgba(0,0,0,1); background: #000; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .game-image { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: 0.5s; }
    .lupa-btn { position: absolute; bottom: 10px; right: 10px; width: 34px; height: 34px; border: 1px solid var(--gold); background: rgba(0,0,0,0.7); color: var(--gold); display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; font-size: 1.2rem; }
    .lupa-btn:hover { background: var(--blood); color: white; border-color: var(--blood); }
    .cronista-text { background: rgba(10, 10, 10, 0.8); border: 1px solid var(--blood); border-left: 4px solid var(--blood); padding: 1.5rem; font-size: 1.15rem; line-height: 1.5; color: var(--pale); white-space: pre-wrap; margin-bottom: 1rem; position: relative; font-style: italic; }
    .cronista-text::before { content: 'NARRATIVA:'; font-family: var(--font-display); font-size: 0.8rem; color: var(--blood); display: block; margin-bottom: 0.5rem; opacity: 0.8; font-style: normal; }
    .choice-btn { width: 100%; text-align: left; padding: 1rem; font-family: var(--font-display); font-size: 0.85rem; letter-spacing: 0.05em; border: 1px solid var(--blood); background: rgba(139, 0, 0, 0.1); color: var(--pale); cursor: pointer; margin-bottom: 0.75rem; transition: all 0.2s; position: relative; text-transform: uppercase; }
    .choice-btn:hover { background: var(--blood); color: white; box-shadow: 0 0 10px rgba(139,0,0,0.5); }
    .custom-action-ctr { margin-top: 1rem; border-top: 1px solid rgba(160, 120, 48, 0.2); padding-top: 1rem; }
    .custom-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--gold); color: #fff; font-family: var(--font-body); font-style: italic; font-size: 1.1rem; padding: 0.5rem 0; outline: none; margin-bottom: 1rem; }
    .custom-input::placeholder { color: rgba(200, 190, 176, 0.5); }
    .status-badge { font-size: 0.8rem; color: var(--gold); font-family: var(--font-body); padding: 0.5rem 0; display: inline-block; margin-top: 0.5rem; }
    .hp-container { display: flex; align-items: center; gap: 0.5rem; justify-content: flex-end; margin-top: 0.2rem; }
    .hp-label { color: var(--blood); font-size: 1.2rem; font-family: var(--font-display); text-shadow: 0 0 5px rgba(139,0,0,0.8); }
    .hp-bar-bg { width: 120px; height: 10px; background: rgba(0,0,0,0.8); border: 1px solid var(--blood); overflow: hidden; }
    .hp-bar-fill { height: 100%; background: var(--blood); width: 100%; transition: width 0.5s ease-out; box-shadow: 0 0 10px var(--blood); }
    
    @keyframes bloodPulse {
        0% { box-shadow: inset 0 0 0px transparent; }
        50% { box-shadow: inset 0 0 100px rgba(139,0,0,0.6); border: 2px solid var(--blood); }
        100% { box-shadow: inset 0 0 0px transparent; }
    }
    .blood-flash { animation: bloodPulse 4s ease-out; }

    #screen-lightbox { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; padding: 2rem; }
    #screen-lightbox.active { display: flex; }
    #lightbox-img { max-width: 100%; max-height: 100%; object-fit: contain; border: 2px solid var(--gold); box-shadow: 0 0 50px rgba(0,0,0,1); }
    #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--blood); color: #fff; padding: 0.6rem 1.2rem; font-size: 0.8rem; z-index: 2000; opacity: 0; transition: 0.3s; pointer-events: none; font-family: var(--font-display); box-shadow: 0 0 15px rgba(139,0,0,0.8); }

    @media (min-width: 900px) {
      #screen-game .cr-body { display: grid; grid-template-areas: "image text" "image choices" "image custom"; grid-template-columns: 1fr 380px; gap: 1rem 2rem; align-items: start; }
      #game-image-wrapper { grid-area: image; height: 100%; max-height: 70vh; margin-bottom: 0 !important; }
      .cronista-text { grid-area: text; margin-bottom: 0 !important; }
      #choices-ctr { grid-area: choices; display: flex; flex-direction: column; gap: 0.75rem; }
      #customActionCtr { grid-area: custom; margin-top: 0 !important; padding-top: 1rem !important; border-top: 1px solid rgba(160, 120, 48, 0.2) !important; }
    }

    @keyframes tremble {
        0% { transform: translate(1px, 1px) rotate(0deg); }
        10% { transform: translate(-1px, -2px) rotate(-1deg); }
        20% { transform: translate(-3px, 0px) rotate(1deg); }
        30% { transform: translate(3px, 2px) rotate(0deg); }
        40% { transform: translate(1px, -1px) rotate(1deg); }
        50% { transform: translate(-1px, 2px) rotate(-1deg); }
        60% { transform: translate(-3px, 1px) rotate(0deg); }
        70% { transform: translate(3px, 1px) rotate(-1deg); }
        80% { transform: translate(-1px, -1px) rotate(1deg); }
        90% { transform: translate(1px, 2px) rotate(0deg); }
        100% { transform: translate(1px, -2px) rotate(-1deg); }
    }
    .text-tremble {
        animation: tremble 0.2s infinite;
        color: var(--blood) !important;
        text-shadow: 0 0 8px rgba(139,0,0,0.8);
    }
    @keyframes pact-pulse {
        0% { transform: scale(1) translate(0, 0); text-shadow: 0 0 5px var(--gold), 0 0 10px var(--gold); }
        50% { transform: scale(1.02) translate(1px, 1px); color: var(--gold) !important; text-shadow: 0 0 15px var(--void), 0 0 20px var(--gold); }
        100% { transform: scale(1) translate(0, 0); text-shadow: 0 0 5px var(--gold), 0 0 10px var(--gold); }
    }
    .text-pact {
        animation: pact-pulse 2s infinite;
        color: var(--white) !important;
    }
    @keyframes void-fade {
        0% { filter: blur(0px); opacity: 1; letter-spacing: 0px; text-shadow: 0 0 0px transparent; }
        50% { filter: blur(1.5px); opacity: 0.6; letter-spacing: 2px; text-shadow: 0 0 10px rgba(0,0,0,0.8); }
        100% { filter: blur(0px); opacity: 1; letter-spacing: 0px; text-shadow: 0 0 0px transparent; }
    }
    .text-void {
        animation: void-fade 4s infinite;
        color: #888 !important;
    }
  </style>
</head>
<body>
  <div id="screen-lightbox" onclick="this.classList.remove('active')"><img src="" id="lightbox-img" /></div>
  <div id="loader"><div class="loader-ring"></div></div>
  <div class="bg"></div><div class="scanlines"></div><div class="embers" id="embers"></div><div id="toast"></div>

  <!-- SPLASH -->
  <div id="screen-splash" class="screen-overlay">
    <div class="cr-body" style="display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;">
        <h1 style="font-family:'Cinzel Decorative'; font-size:2.5rem; color:var(--white); margin-bottom:1rem;">ECLIPSE</h1>
        <p style="font-style:italic; color:var(--gold); margin-bottom:3rem;">v4.8 — Reflejos del Alma</p>
        <button class="btn" onclick="showScreen('screen-creation'); renderStep();">⚔ Iniciar Nueva Crónica</button>
    </div>
  </div>

  <!-- BOTÓN GLOBAL ARCHIVO VISUAL -->
  <div id="btnGallery" class="hidden" onclick="showGallery()" style="position:fixed; bottom:20px; left:20px; z-index:900; background:rgba(0,0,0,0.8); border:1px solid var(--gold); padding:0.5rem 1rem; color:var(--gold); cursor:pointer; font-family:var(--font-display); letter-spacing:0.1em; transition:0.3s;">
     📁 ARCHIVO
  </div>

  <!-- GALLERY SCREEN -->
  <div id="screen-gallery" class="screen-overlay hidden" style="background:rgba(0,0,0,0.95); z-index:950; overflow-y:auto; padding:2rem; align-items:center; display:none;">
      <div style="width:100%; max-width:800px; display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
          <h2 style="font-family:var(--font-display); color:var(--gold); font-size:1.5rem; margin:0;">Archivo Visual</h2>
          <button class="btn btn-ghost" onclick="closeGallery()" style="padding:0.5rem 1rem;">Volver</button>
      </div>
      <div id="galleryGrid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:1rem; width:100%; max-width:800px; padding-bottom:4rem;">
      </div>
  </div>

  <!-- CREACION -->
  <div id="screen-creation" class="screen-overlay hidden">
      <div class="cr-header"><div class="cr-title" id="crTitle"></div></div>
      <div class="cr-body" id="crBody"></div>
      <div class="cr-footer">
          <button class="btn btn-ghost" id="btnBack">Atrás</button>
          <button class="btn" style="flex:1" id="btnNext">Continuar</button>
      </div>
  </div>

  <!-- RETRATO -->
  <div id="screen-portrait" class="screen-overlay hidden">
      <div class="cr-header"><div class="cr-title">Tu Rostro en el Tiempo</div></div>
      <div class="cr-body">
          <div class="portrait-frame">
              <div class="loader-ring" id="portraitLoader" style="position:absolute;"></div>
              <img src="" class="portrait-img" id="portraitImg" />
              <div class="lupa-btn" onclick="openPortraitLightbox()" id="lupaPortraitBtn" style="display:none">🔍</div>
          </div>
          <div style="display:flex; gap:0.5rem">
              <button class="btn btn-ghost" style="flex:1" id="btnRegenerate" onclick="generatePortrait()">Regenerar</button>
              <button class="btn" style="flex:1" id="btnConfirmPortrait" disabled onclick="showScreen('screen-memory')">Sellar ⚔</button>
          </div>
      </div>
  </div>

  <!-- RECUERDO -->
  <div id="screen-memory" class="screen-overlay hidden">
      <div class="cr-header"><div class="cr-title">El Último Recuerdo</div></div>
      <div class="cr-body">
          <p style="font-style:italic; margin-bottom:1rem; font-size:0.9rem; color:#7a6050">«Antes del Eclipse... ¿Qué viste?»</p>
          <textarea class="epic-textarea" id="iMemory" rows="6" placeholder="Escribe tu recuerdo..."></textarea>
      </div>
      <div class="cr-footer">
          <button class="btn" style="flex:1" onclick="confirmMemory()">Iniciar Destino</button>
      </div>
  </div>

  <!-- LOADING NARRATIVA -->
  <div id="screen-loading" class="screen-overlay hidden" style="align-items:center; justify-content:center;">
      <div class="loader-ring" style="width:60px; height:60px;"></div>
      <p id="loadingMsg" style="margin-top:2rem; font-family:'Cinzel Decorative'; color:var(--gold); animation:pulse 2s infinite;">El Cronista entrelaza los hilos...</p>
  </div>
  
  <!-- JUEGO -->
  <div id="screen-game" class="screen-overlay hidden">
    <div class="cr-header" style="display:flex; flex-direction:column; align-items:stretch; text-align:left;">
        <div style="width:100%; display:flex; justify-content:space-between; align-items:flex-start;">
            <span id="gameCharName" style="font-family:var(--font-display); font-size:2rem; color:var(--blood); text-shadow:0 0 15px rgba(139,0,0,0.6); letter-spacing:0.1em; text-transform:uppercase;"></span>
            <div style="text-align:right;">
                <span id="gameRace" style="font-size:0.7rem; color:var(--gold); letter-spacing:0.2em; text-transform:uppercase;"></span>
                <div class="hp-container">
                    <div class="hp-label">HP <span id="hpValue">100</span></div>
                    <div class="hp-bar-bg"><div class="hp-bar-fill" id="hpBar"></div></div>
                </div>
                <div id="gameStatus" class="status-badge" style="display:block; margin-top:0.2rem; text-align:right;">Estado: Intacto</div>
            </div>
        </div>
    </div>
    <div class="cr-body">
      <div id="game-image-wrapper" class="hidden">
          <div class="loader-ring" id="gameImageLoader" style="position:absolute;"></div>
          <img src="" class="game-image" id="gameImage" />
          <div class="lupa-btn" onclick="openLightbox()">🔍</div>
      </div>
      <div id="spikeWarning" style="display:none; color:var(--blood); font-family:var(--font-display); font-size:1.2rem; text-align:center; padding: 1rem; border: 1px solid var(--blood); background: rgba(20,0,0,0.8); margin-bottom:1rem; text-shadow:0 0 10px rgba(139,0,0,1); animation:pulse 2s infinite;"></div>
      <div class="cronista-text" id="gameText"></div>
      <div id="choices-ctr"></div>
      <div class="custom-action-ctr" id="customActionCtr" style="display:none">
          <input type="text" class="custom-input" id="iCustomAction" placeholder="Escribe tu propia voluntad..." onkeypress="if(event.key === 'Enter') submitCustomAction()">
          <button class="btn" style="width:100%" onclick="submitCustomAction()">Enviar Voluntad ⚔</button>
      </div>
    </div>
    <div class="cr-footer" style="background:none; justify-content:center; padding-bottom:3rem;">
        <div class="loader-ring" id="gameFooterLoader" style="display:none"></div>
    </div>
  </div>

  <!-- MUERTE -->
  <div id="screen-death" class="screen-overlay hidden" style="background:#050000; align-items:center; justify-content:center; text-align:center;">
      <h1 style="font-family:var(--font-display); font-size:4rem; color:var(--blood); margin-bottom:1rem; text-shadow:0 0 20px rgba(139,0,0,0.8);">HAS CAÍDO</h1>
      <div id="death-image-wrapper" style="width:100%; max-width:600px; aspect-ratio:16/9; border:2px solid var(--blood); margin-bottom:2rem; overflow:hidden; position:relative; box-shadow:0 0 30px rgba(139,0,0,0.5);">
          <img src="" id="deathImage" style="width:100%; height:100%; object-fit:cover;" />
          <div class="lupa-btn" onclick="openDeathLightbox()">🔍</div>
      </div>
      <p id="deathText" style="font-family:var(--font-body); font-style:italic; font-size:1.2rem; margin-bottom:3rem; padding:0 2rem; max-width:800px; line-height:1.6; color:var(--pale);"></p>
      <button class="btn" onclick="hardReset()">⚔ REENCARNAR</button>
  </div>

  <script>
  const RACES = [
    { id:'saiyan', icon:'🔥', name:'Saiyan Maldito', desc:'Tu ki crece con cada herida. La bestia exige tributo.', visual:'muscular warrior, wild spiky black hair' },
    { id:'humano', icon:'⚡', name:'Humano Forjado', desc:'Sin ki innato. Solo voluntad. Los dioses apuestan en tu contra.', visual:'athletic scarred human warrior' },
    { id:'namekiano', icon:'🌑', name:'Namekiano', desc:'Te regeneras, pero cada vez olvidas quién eras.', visual:'green skin alien, BALD head, pointed ears' },
    { id:'majin', icon:'💀', name:'Majin Fracturado', desc:'Poder divino en mente rota. ¿Quién controla a quién?', visual:'pink bubblegum skin alien, BALD head' },
    { id:'frio', icon:'❄', name:'Raza Fría', desc:'Tu especie fue borrada. El universo debe explicaciones.', visual:'bio-mechanical armor, BALD smooth head' }
  ];
  const TRAITS = [
      {id:'ira', name:'Ira Primordial', desc:'En estado crítico, tu poder se multiplica de forma incontrolable. El costo es tu cordura.'}, 
      {id:'instinto', name:'Instinto de Depredador', desc:'Lees el combate antes de que ocurra, a costa de perder tu empatía.'}, 
      {id:'pacto', name:'Pacto Oscuro', desc:'Algo te otorgó poder que no te pertenecía. Algún día vendrá a cobrarlo con intereses.'},
      {id:'vacio', name:'Eco del Vacío', desc:'Puedes ignorar el dolor por completo, pero cada vez que lo haces, pierdes recuerdos fundamentales de quién eres.'}
  ];

  let state = { 
      step: 0, 
      char: { name:'', race:'', appearance:'', darkOrigin:'', trait:'', lastMemory: '', status: 'Intacto. Calma helada', hp: 100, injuries_ui: [], injuries_prompt: [] },
      images: []
  };
  let gameHistory = []; 
  
  const MASTER_STYLE = "Masterpiece cinematic dark fantasy, Kentaro Miura anatomical detail, Akira Toriyama biological aesthetic. Intense chiaroscuro. High resolution.";

  function hardReset() { localStorage.clear(); window.location.reload(); }
  function showScreen(id) { 
      ['screen-splash','screen-creation','screen-portrait','screen-memory','screen-loading','screen-game','screen-death','screen-gallery'].forEach(s => {
          document.getElementById(s).classList.add('hidden');
          if(s==='screen-gallery') document.getElementById(s).style.display='none';
      }); 
      document.getElementById(id).classList.remove('hidden'); 
      if(id==='screen-gallery') {
          document.getElementById(id).style.display='flex';
          document.getElementById(id).style.flexDirection='column';
      }
      
      if(id==='screen-game' || id==='screen-death') {
          document.getElementById('btnGallery').classList.remove('hidden');
          document.getElementById('btnGallery').style.display='block';
      } else if (id!=='screen-gallery') {
          document.getElementById('btnGallery').classList.add('hidden');
          document.getElementById('btnGallery').style.display='none';
      }
  }

  function showGallery() {
      const grid = document.getElementById('galleryGrid');
      grid.innerHTML = '';
      state.images.forEach(img => {
          const div = document.createElement('div');
          div.style.border = '1px solid var(--gold)';
          div.style.background = '#000';
          div.style.padding = '0.5rem';
          div.innerHTML = `
            <img src="${img.url}" style="width:100%; aspect-ratio:16/9; object-fit:cover; border-bottom:1px solid var(--blood); margin-bottom:0.5rem; cursor:pointer;" onclick="openLightboxFromGallery('${img.url}')"/>
            <p style="font-family:var(--font-body); font-style:italic; font-size:0.85rem; color:var(--pale); text-align:center;">${img.desc}</p>
          `;
          grid.appendChild(div);
      });
      // Store current screen before opening gallery
      if(!state.lastScreen) state.lastScreen = document.querySelector('.screen-overlay:not(.hidden)').id;
      if (state.lastScreen === 'screen-gallery') state.lastScreen = 'screen-game'; // fallback
      showScreen('screen-gallery');
      document.getElementById('btnGallery').classList.add('hidden');
      document.getElementById('btnGallery').style.display='none';
  }

  function extractSection(text, keyRegex) {
      if (text.startsWith('"') && text.endsWith('"')) {
          try { text = JSON.parse(text); } catch(e) {}
      }
      text = text.replace(/<think>[\s\S]*?(?:<\/think>|$)/gi, '');
      text = text.replace(/\\n/g, '\n').replace(/\\"/g, '"');
      text = text.replace(/```[^\n]*\n?/g, '').replace(/```/g, '');
      text = text.replace(/^#+\s+/gm, ''); 
      text = text.replace(/^-+\s+/gm, ''); 
      const nextSections = `(?:\\*\\*)?(?:NARRATIVA|ESTADO|SALUD|HERIDA_UI|HERIDA_PROMPT|IMAGEN|OPCI[OÓ]N 1|OPCI[OÓ]N 2|OPCI[OÓ]N 3|OPCI[OÓ]N 4|OPCI[OÓ]N|MUERTE)(?:\\*\\*)?:`;
      const regex = new RegExp(`(?:\\*\\*)?${keyRegex}(?:\\*\\*)?:\\s*([\\s\\S]*?)(?=${nextSections}|$)`, 'i');
      const match = text.match(regex);
      let result = match ? match[1].trim() : "";
      return result.replace(new RegExp(`${nextSections}.*$`, 'is'), '').trim();
  }

            const validOps = [op1, op2, op3].filter(o => o && o.length > 2);
            validOps.forEach(c => { 
                const b = document.createElement('button'); b.className = 'choice-btn'; 
                b.textContent = c; b.onclick = () => gameTurn(c); 
                cCtr.appendChild(b); 
            });
            if (state.char.isBerserk || state.char.isFeral || isPactToll) {
                document.getElementById('customActionCtr').style.display = 'none';
                // Si la IA falla en dar opciones, damos una por defecto para no bloquear el juego
                if (validOps.length === 0) {
                    const b = document.createElement('button'); b.className = 'choice-btn'; 
                    b.style.borderColor = 'var(--blood)'; b.style.color = 'var(--blood)';
                    b.textContent = "Me consumo en la oscuridad absoluta..."; 
                    b.onclick = () => gameTurn("Me consumo en mi aflicción..."); 
                    cCtr.appendChild(b); 
                }
            } else {
                document.getElementById('customActionCtr').style.display = 'block';
            }
            fLoad.style.display = 'none';
        });
    } catch(e) { 
        fLoad.style.display='none'; 
        txt.innerHTML = "El nexo se ha fracturado. Ordena tu voluntad de nuevo."; 
        const retryBtn = document.createElement('button');
        retryBtn.className = 'choice-btn';
        retryBtn.style.borderColor = 'var(--ember)';
        retryBtn.textContent = "Volver a intentar...";
        retryBtn.onclick = () => gameTurn(choice);
        cCtr.appendChild(retryBtn);
        if(!(state.char.isBerserk || state.char.isFeral || isPactToll)) document.getElementById('customActionCtr').style.display = 'block'; 
    }
  }

  function handleDeath(narrative, imgContext) {
      showScreen('screen-death');
      // Aseguramos quitar los tags ocultos si los hubiera
      let cleanNarrative = narrative.replace(/<think>[\s\S]*?<\/think>/gi, '').trim();
      document.getElementById('deathText').textContent = cleanNarrative;
      const cleanImgDesc = sanitize(imgContext);
      const anatomyPrompt = state.char.injuries_prompt.length ? `[CRITICAL ANATOMY RULE: ${state.char.injuries_prompt.join(', ')} MUST BE VISIBLE]` : "";
      const antiHair = (state.char.race==='namekiano' || state.char.race==='majin' || state.char.race==='frio') ? "BALD HEAD, NO HAIR." : "";
      const imgP = `${MASTER_STYLE} TRAGIC ENDING SHOT 100% FAITHFUL TO THE SCENE: ${cleanImgDesc}. DEFEATED, DEAD CORPSE LYING ON THE GROUND. BLOODY REMAINS. (FEATURING THE DEFEATED DEAD CHARACTER: ${state.char.appearance}. CONDITION: ${anatomyPrompt}. ${antiHair}). GRIM, DARK AND BLEAK ATMOSPHERE.`;
      
      const dImg = document.getElementById('deathImage');
      dImg.src = `https://image.pollinations.ai/prompt/${encodeURIComponent(imgP)}?width=896&height=504&model=flux&nologo=true`;
      dImg.onload = () => {
          state.images.push({ url: dImg.src, desc: "El fin de la crónica" });
      };
  }

  function typewriter(el, text, speed, onDone) { 
      let i = 0; 
      const iv = setInterval(() => { 
          if (i < text.length) { el.appendChild(document.createTextNode(text[i])); i++; } 
          else { clearInterval(iv); if(onDone) onDone(); } 
      }, speed); 
  }
  
  function openLightbox() { 
      document.getElementById('lightbox-img').src = document.getElementById('gameImage').src; 
      document.getElementById('screen-lightbox').classList.add('active'); 
  }

  function openPortraitLightbox() {
      document.getElementById('lightbox-img').src = document.getElementById('portraitImg').src;
      document.getElementById('screen-lightbox').classList.add('active');
  }

  function openDeathLightbox() {
      document.getElementById('lightbox-img').src = document.getElementById('deathImage').src;
      document.getElementById('screen-lightbox').classList.add('active');
  }
  
  window.onload = () => { 
      setTimeout(() => document.getElementById('loader').classList.add('hidden'), 600); 
      const eb = document.getElementById('embers'); 
      for(let i=0; i<10; i++) { 
          const e = document.createElement('div'); e.className='ember'; 
          e.style.setProperty('--x',Math.random()*100+'vw'); 
          e.style.setProperty('--dur',Math.random()*5+5+'s'); 
          eb.appendChild(e); 
      } 
  };
  </script>
</body>
